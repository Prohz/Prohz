<!doctype html>
<html lang="en-US">

<head>
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type" />
    <title>Reset Password Email Template</title>
    <meta name="description" content="Reset Password Email Template.">
    <style type="text/css">
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
        body {
            font-family: 'Poppins', sans-serif;
        }
        a:hover {
            text-decoration: underline !important;
        }
    </style>
</head>

<body marginheight="0" topmargin="0" marginwidth="0" style="margin: 0px; background-color: #f2f3f8;" leftmargin="0">
    <!--100% body table-->
    <table cellspacing="0" border="0" cellpadding="0" width="100%" bgcolor="#f2f3f8">
            

        
        <tr>
            <td>
                <table style="background-color: #f2f3f8; max-width:670px;  margin:0 auto;" width="100%" border="0"
                       align="center" cellpadding="0" cellspacing="0">
                    <tr>
                        <td style="height:80px;">&nbsp;</td>
                    </tr>
                    <!--<tr>
                        <td style="text-align:center;">
                            <a href="#" title="logo" target="_blank">
                                <img width="190" src="./Prohz-logo.png" title="logo" alt="logo">
                            </a>
                        </td> {usernmae}
                    </tr>-->
                    <tr>
                        <td style="height:20px;">&nbsp;</td>
                    </tr>
                    <tr>
                        <td>
                            <table width="95%" border="0" align="center" cellpadding="0" cellspacing="0"
                                   style="max-width: 670px; background: #191C24; border-radius: 10px; text-align: center; -webkit-box-shadow: 0 6px 18px 0 rgba(0,0,0,.06); -moz-box-shadow: 0 6px 18px 0 rgba(0,0,0,.06); box-shadow: 0 6px 18px 0 rgba(0,0,0,.06);">
                                <tr>
                                    <td style="height:9px;"></td>
                                </tr>

                                <tr>
                                    <td style="text-align: center; border-bottom: 1px solid #484D58; padding-bottom:10px;">
                                        <a href="#" title="logo" target="_blank">
                                           
                                            <img width="120" src="{ImagePath}" title="logo" alt="logo">
                                        </a>
                                    </td>
                                </tr>
                                <!--<tr>
                                    <td><img width="130px" src="./success-mail.gif" /></td>
                                </tr>-->
                                <tr>
                                    <td style="height:70px;">&nbsp;</td>
                                </tr>
                                <tr>
                                    <td style="padding:0 35px;">
                                        <h1 style="color: #fff; font-weight: 500; margin: 0; font-size: 32px; font-family: 'Poppins', sans-serif;">
                                          You have requested to reset your password!
                                        </h1>
                                        <span style="display:inline-block; vertical-align:middle; margin:15px 0 26px; border-bottom:1px solid #cecece; width:100px;"></span>
                                        <p style="color: #B1B1B1; font-size: 15px; line-height: 24px; margin: 0;">
                                            Use the link below to set up a new password for your account. If you did not request to reset your password, ignore this email.
                                        </p>
                                        <a href="{URL}"
                                           style="background: #ADD136; letter-spacing: 0.5px; text-decoration: none !important; font-weight: 600; margin-top: 35px; color: #000; text-transform: uppercase; font-size: 16px; padding: 12px 24px; display: inline-block; border-radius: 50px;">
                                            SET NEW PASSWORD
                                        </a>
                                    </td>
                                </tr>
                                <tr>
                                    <td style="height:80px;">&nbsp;</td>
                                </tr>
                            </table>
                        </td>
                    <tr>
                        <td style="height:13px;"></td>
                    </tr>
                    <tr>
                        <td style="text-align:center;">
                            <p style="font-size:14px; color:rgba(69, 80, 86, 0.7411764705882353); line-height:18px; margin:0 0 0;">&copy; Copyright 2023 Prohz. All rights reserved.</p>
                        </td>
                    </tr>
                    <tr>
                        <td style="height:80px;">&nbsp;</td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
    <!--/100% body table-->
</body>

</html>
